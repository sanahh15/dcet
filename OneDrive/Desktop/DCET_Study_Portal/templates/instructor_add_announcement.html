{% extends "instructor_layout.html" %}

{% block title %}Post Announcement{% endblock %}

{% block content %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    h2 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 32px;
        color: #001f3f;
    }

    form {
        max-width: 800px;
        margin: auto;
        background: white;
        color: #001f3f;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    label {
        display: block;
        font-weight: 600;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    input[type="text"],
    textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
        font-family: 'Poppins', sans-serif;
    }

    textarea {
        min-height: 200px;
        resize: vertical;
    }

    button[type="submit"] {
        display: block;
        width: 100%;
        background: linear-gradient(to right, #007bff, #0056b3);
        color: white;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
    }

    button[type="submit"]:hover {
        background: linear-gradient(to right, #0056b3, #003d7a);
    }
</style>

<h2>📢 Post Announcement</h2>

<form method="POST">
    <label for="title">Announcement Title:</label>
    <input type="text" id="title" name="title" placeholder="e.g., Important Update on Exam Schedule" required>

    <label for="message">Message:</label>
    <textarea id="message" name="message" placeholder="Enter your announcement here..." required></textarea>

    <button type="submit">📤 Post Announcement</button>
</form>

{% endblock %}
