
<!DOCTYPE html>
<html>
<head>
    <title>Instructor Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #001f3f, #003366);
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #000814;
            padding: 15px;
            text-align: right;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #00b4d8;
        }

        /* Login Box */
        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #001f3f;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #003366;
        }

        .flash {
            color: red;
        }
    </style>
</head>
<head>
    <meta http-equiv="refresh" content="0; url=/login" />
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/student/login">Student</a>
        <a href="/admin/login">Admin</a>
    </div>

    <!-- Login Form -->
    <div class="login-box">
        <h2>Instructor Login</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
