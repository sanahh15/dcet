{% extends "instructor_layout.html" %}

{% block title %}Select Subject{% endblock %}

{% block content %}

<style>
h2{
text-align: center;
font-size:38px;
margin-bottom:50px;
letter-spacing:1px;
color: #08111b;
}

.subjects-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
width:90%;
max-width:1200px;
margin:auto;
}

.subject-card{
background:white;
color:#001f3f;
padding:35px 20px;
border-radius:16px;
text-align:center;
font-weight:600;
font-size:18px;
text-decoration:none;
transition:all 0.35s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
}

.subject-card span{
font-size:35px;
display:block;
margin-bottom:10px;
}

.subject-card:hover{
transform:translateY(-10px) scale(1.04);
background:linear-gradient(135deg,#4CAF50,#45A049);
color:white;
box-shadow:0 18px 35px rgba(0,0,0,0.35);
}

@media(max-width:600px){
h2{
font-size:28px;
}
}
</style>

<h2>Select Subject to Add MCQs</h2>

<div class="subjects-container">

<a class="subject-card" href="/instructor/add_mcq/engineering_mathematics">
<span>📐</span>
Engineering Mathematics
</a>

<a class="subject-card" href="/instructor/add_mcq/statistics_analytics">
<span>📊</span>
Statistics & Analytics
</a>

<a class="subject-card" href="/instructor/add_mcq/it_skills">
<span>💻</span>
IT Skills
</a>

<a class="subject-card" href="/instructor/add_mcq/feee">
<span>⚡</span>
Fundamentals of Electrical & Electronics Engineering
</a>

<a class="subject-card" href="/instructor/add_mcq/pms">
<span>📁</span>
Project Management Skills
</a>

</div>

{% endblock %}
