
<!DOCTYPE html>
<html>
<head>
    <title>Materials for {{ subject.name }}</title>
    
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 20px; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h2 { text-align: center; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 10px 0; padding: 10px; background: #f1f1f1; border-radius: 5px; }
        a { text-decoration: none; color: #1f4fa3; margin-left: 10px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Materials for {{ subject.name }}</h2>
     <a href="/admin/dashboard" class="back-btn">← Back to Dashboard</a>
        <ul>
            {% if materials %}
                {% for material in materials %}
                    <li>
    <strong>{{ material.title }}</strong>
    <a href="/admin/add-dcet/{{ subject.id }}">➕ Edit / Add</a>
    
    <!-- Delete form -->
    <form action="/admin/delete-dcet/{{ material.id }}" method="POST" style="display:inline;">
        <button type="submit" style="background:red;color:white;border:none;padding:3px 6px;border-radius:3px;cursor:pointer;">🗑️ Delete</button>
    </form>

    {% if material.qp_file %}
        <a href="{{ url_for('static', filename=material.qp_file.split('static/')[-1]) }}" target="_blank">📄 Download</a>
    {% endif %}
</li>

                {% endfor %}
            {% else %}
                <li>No materials added yet.</li>
            {% endif %}
        </ul>
    </div>
</body>
</html>
