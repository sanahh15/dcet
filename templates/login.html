<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');


/* Set background image and cover full screen */
body {
    font-family: 'Poppins', sans-serif;
    background: url('/static/images/dcet_background.png') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100%;
    margin: 0;
    color: white;
}

.login-box {
    background: rgba(255, 255, 255, 0.15); /* semi-transparent */
    backdrop-filter: blur(10px);           /* glass blur effect */
    -webkit-backdrop-filter: blur(10px);   /* for Safari */
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.3); /* subtle border */
    padding: 40px 30px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-box:hover {
   transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
}

.login-box h1 {
    font-size: 28px;
    font-weight: 700;
    color: hsl(231, 92%, 52%);
    margin-bottom: 5px;
}

.login-box p.subtitle {
    font-size: 16px;
    color: #333;
    margin-bottom: 25px;
}


.login-box h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #ffffff; /* white text on transparent background */
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

input {
    width: 90%;
    padding: 12px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

input:focus {
    border-color: #3026ee;
    box-shadow: 0 0 8px rgba(71, 103, 245, 0.5);
    outline: none;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(135deg, #1806e2 , #1806e2);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: background 0.3s ease, transform 0.2s ease;
}

button:hover {
    background: linear-gradient(135deg, #45A049, #4CAF50);
    transform: translateY(-2px);
}

.flash-messages {
    color: red;
    margin-bottom: 15px;
    font-size: 13px;
}

a {
    color: #003366;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    color: #4CAF50;
}

</style>

</head>
<body>

<div class="login-box">
    <h1>DCET Study Portal</h1>
    <p class="subtitle">Diploma → Engineering Lateral Entry Preparation</p>

    <h2>Portal Login</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages">
          {% for msg in messages %}{{ msg }}<br>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    
    <p>Don't have an account? <a href="/student/register">Register here</a></p>
</div>

</body>
</html>
