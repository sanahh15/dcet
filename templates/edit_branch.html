<!DOCTYPE html>
<html>
<head>
    <title>Edit Branch</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }
        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #1f4fa3;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Branch</h2>

    <form method="POST">
        <input type="text" name="branch_name" value="{{ branch.name }}" required>
        <button type="submit">Update Branch</button>
    </form>
</div>

</body>
</html>
